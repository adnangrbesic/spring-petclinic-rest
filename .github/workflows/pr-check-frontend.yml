name: PR Check Frontend

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: spring-petclinic-angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
