name: PR Check Frontend

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: spring-petclinic-angular

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test-headless -- --code-coverage
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: spring-petclinic-angular
          args: >
            -Dsonar.organization=adnagrbestic
            -Dsonar.projectKey=spring-petclinic-angular
