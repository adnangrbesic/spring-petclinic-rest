name: PR Check

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: spring-petclinic-rest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Run tests
        run: ./mvnw test
