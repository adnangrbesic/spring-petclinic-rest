backend:
  replicaCount: 1
  image:
    repository: petclinic-backend
    tag: latest
    pullPolicy: Never
  service:
    port: 9966
  env:
    port: "9966"

frontend:
  replicaCount: 1
  image:
    repository: petclinic-frontend
    tag: latest
    pullPolicy: Never
  service:
    port: 80

postgres:
  replicaCount: 1
  image:
    repository: petclinic-db
    tag: latest
    pullPolicy: Never
  service:
    port: 5432
  storage:
    size: 1Gi
  secret:
    dbName: petclinic
    dbUser: petclinic
    dbPassword: petclinic

ingress:
  enabled: true
  hosts:
    - host: petclinic.localhost
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 80
    - host: api.petclinic.localhost
      paths:
        - path: /
          pathType: Prefix
          service: backend
          port: 9966

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
