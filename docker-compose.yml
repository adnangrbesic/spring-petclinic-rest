services:
  postgres:
    build:
      context: ./db
    image: petclinic-db
    container_name: petclinic-db
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - petclinic-net

  backend:
    build:
      context: ./spring-petclinic-rest
    image: petclinic-backend
    container_name: petclinic-backend
    ports:
      - "${BACKEND_PORT}:9966"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petclinic-net

  prometheus:
    image: prom/prometheus:latest
    container_name: petclinic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - petclinic-net
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: petclinic-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - petclinic-net
    depends_on:
      - prometheus

  frontend:
    build:
      context: ./spring-petclinic-angular
    image: petclinic-frontend
    container_name: petclinic-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - petclinic-net

volumes:
  postgres_data:
  prometheus-data:
  grafana-storage:

networks:
  petclinic-net:
    driver: bridge
